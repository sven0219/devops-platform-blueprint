name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: demo-service

jobs:
  validate:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Scan dependencies
        run: npm audit --audit-level=high

  build:
    name: Build and scan image
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: |
          short_sha="${GITHUB_SHA::7}"
          version="$(node -p "require('./package.json').version")"
          echo "tag=v${version}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --label org.opencontainers.image.source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            --label org.opencontainers.image.version="${{ steps.meta.outputs.tag }}" \
            -t "ghcr.io/${GITHUB_REPOSITORY_OWNER}/${IMAGE_NAME}:${{ steps.meta.outputs.tag }}" .

      - name: Scan image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Push image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker push "ghcr.io/${GITHUB_REPOSITORY_OWNER}/${IMAGE_NAME}:${{ steps.meta.outputs.tag }}"
