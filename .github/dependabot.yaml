version: 2
updates:
  - package-ecosystem: github-actions
    directory: /examples/app-repo/.github/workflows
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: npm
    directory: /examples/app-repo
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    groups:
      npm-patch-and-minor:
        update-types:
          - patch
          - minor
        patterns:
          - "*"
    labels:
      - dependencies
      - npm

  - package-ecosystem: github-actions
    directory: /examples/gitops-repo/.github/workflows
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
