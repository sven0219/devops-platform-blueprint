name: Release demo-service

on:
  push:
    tags:
      - v*

env:
  IMAGE_NAME: demo-service

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Publish versioned release
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Generate image metadata
        id: meta
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          short_sha="${GITHUB_SHA::7}"
          echo "image=ghcr.io/${owner}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_REF_NAME}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --label org.opencontainers.image.source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            --label org.opencontainers.image.version="${{ steps.meta.outputs.release_tag }}" \
            --label org.opencontainers.image.created="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.release_tag }}" \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}" .

      - name: Scan release image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.release_tag }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Push release image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.release_tag }}"
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
